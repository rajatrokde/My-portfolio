name: Deploy HTML Website

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      # Optional: setup Pages (not strictly needed here)
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages        # <--- changed to github-pages
          path: ./                  # folder containing your HTML files

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: github-pages       # <--- must match artifact name from build
          path: ./website          # download into workspace folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
