version: 2.1

orbs:
  gh-pages: circleci/gh-pages@1.8.0

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout

      # Install Node (only needed if you want minification or build scripts)
      - run:
          name: Install Node.js
          command: |
            sudo apt update
            sudo apt install -y nodejs npm

      - run:
          name: Install dependencies if package.json exists (optional)
          command: |
            if [ -f package.json ]; then npm install; fi

      - run:
          name: Build website (optional)
          command: |
            if [ -f package.json ]; then npm run build || true; fi

      - persist_to_workspace:
          root: .
          paths:
            - .

workflows:
  deploy_website:
    jobs:
      - build

      - gh-pages/deploy:
          requires:
            - build
          repo: << pipeline.project.git_url >>
          ssh-fingerprint: "<<SSH-FINGERPRINT>>"
          # Folder that contains final HTML/CSS/JS files
          source: "."

          # Target branch
          branch: "gh-pages"
